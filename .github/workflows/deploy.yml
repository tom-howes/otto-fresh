name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - setup/cicd-pipeline

jobs:
  lint:
    name: Lint with style-checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install style-checker dependencies
        run: |
          cd style-checker
          pip install -r requirements.txt

      - name: Lint with style-checker
        run: |
          cd style-checker
          python style-checker.py ../Data-Pipeline
  data-pipeline:
    name: Data Pipeline Full Run
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd Data-Pipeline
          pip install -r requirements.txt

      - name: Run pipeline (ingest, chunk, embed, validate)
        run: |
          cd Data-Pipeline
          python scripts/run_pipeline.py ingest
          python scripts/run_pipeline.py chunk
          python scripts/run_pipeline.py embed
          python scripts/run_pipeline.py validate

      - name: Check for bias (fail if detected)
        run: |
          cd Data-Pipeline
          if jq -e '.bias_detected == true' data/processed/bias_detection.json; then
            echo 'Bias detected! Failing build.'
            exit 1
          else
            echo 'No bias detected.'
          fi

      - name: Upload bias report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bias_detection_report
          path: Data-Pipeline/data/processed/bias_detection.json

  test:
    name: Run Data Pipeline Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd Data-Pipeline
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd Data-Pipeline
          pytest tests/ -v

  deploy-ingest:
    name: Deploy ingest-service
    runs-on: ubuntu-latest
    needs: [data-pipeline, test, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ingest-service
        run: |
          cd ingest-service
          gcloud run deploy ingest-service \
            --source . \
            --region us-east1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --timeout 300 \
            --set-env-vars "\
          GCP_PROJECT_ID=otto-pm,\
          GCS_BUCKET_RAW=otto-raw-repos,\
          GCS_BUCKET_PROCESSED=otto-processed-chunks,\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

  deploy-backend:
    name: Deploy backend-service
    runs-on: ubuntu-latest
    needs: [deploy-ingest, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write secret files
        run: |
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > backend/firebase-credentials.json
          echo '${{ secrets.PRIVATE_KEY }}' > backend/github-private-key.pem

      - name: Deploy backend-service
        run: |
          cd backend
          gcloud run deploy backend-service \
            --source . \
            --region us-east1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 300 \
            --set-env-vars "\
          GCP_PROJECT_ID=otto-pm,\
          GCS_BUCKET_RAW=otto-raw-repos,\
          GCS_BUCKET_PROCESSED=otto-processed-chunks,\
          INGEST_SERVICE_URL=${{ secrets.INGEST_SERVICE_URL }},\
          FIREBASE_CREDENTIALS_PATH=./firebase-credentials.json,\
          FIREBASE_PROJECT_ID=otto-pm,\
          GITHUB_PRIVATE_KEY_PATH=./github-private-key.pem,\
          GITHUB_APP_ID=${{ secrets.APP_ID }},\
          GITHUB_CLIENT_ID=${{ secrets.CLIENT_ID }},\
          GITHUB_CLIENT_SECRET=${{ secrets.CLIENT_SECRET }},\
          GITHUB_CALLBACK_URL=${{ secrets.CALLBACK_URL }},\
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET }},\
          GITHUB_WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}"

  notify:
    name: Send Summary Email
    runs-on: ubuntu-latest
    needs: [data-pipeline, test, deploy-ingest, deploy-backend, lint]
    if: always()  # always runs even if previous jobs failed
    steps:
      - name: Set status
        id: status
        run: |
          if [[ "${{ needs.data-pipeline.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" && \
                "${{ needs.deploy-ingest.result }}" == "success" && \
                "${{ needs.deploy-backend.result }}" == "success" ]]; then
            echo "result= All jobs passed" >> $GITHUB_OUTPUT
          else
            echo "result= One or more jobs failed" >> $GITHUB_OUTPUT
          fi

      - name: Send summary email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          subject: "${{ steps.status.outputs.result }} - Deploy to Cloud Run"
          body: |
            Deployment Summary
            ------------------
            Status:        ${{ steps.status.outputs.result }}
            Repo:          ${{ github.repository }}
            Branch:        ${{ github.ref_name }}
            Commit:        ${{ github.sha }}
            Triggered by:  ${{ github.actor }}

            Job Results:
            - Data Pipeline:    ${{ needs.data-pipeline.result }}
            - Tests:            ${{ needs.test.result }}
            - Deploy Ingest:    ${{ needs.deploy-ingest.result }}
            - Deploy Backend:   ${{ needs.deploy-backend.result }}

            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}